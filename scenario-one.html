<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grey Zone Grid | Scenario One</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260312k" />
  </head>
  <body data-page="scenario-one">
    <div class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow" id="pageEyebrow"></p>
          <h1 id="pageHeading"></h1>
          <p class="hero-dek" id="pageDek"></p>
          <div class="hero-actions" id="heroActions"></div>
        </div>
        <div class="hero-side">
          <div class="schematic-card">
            <p class="mini-label" id="pageContextLabel"></p>
            <div class="schematic-grid" aria-hidden="true">
              <span class="schematic-node node-gas"></span>
              <span class="schematic-node node-grid"></span>
              <span class="schematic-node node-wind"></span>
              <span class="schematic-node node-terminal"></span>
              <span class="schematic-line line-one"></span>
              <span class="schematic-line line-two"></span>
              <span class="schematic-line line-three"></span>
            </div>
            <ul class="scenario-list" id="pageContextList"></ul>
          </div>
          <div class="hero-stat-grid" id="pageStatGrid"></div>
        </div>
      </header>
      <nav class="phase-nav" id="phaseNav" aria-label="Game phases"></nav>
      <main class="control-room" id="game">
        <section class="metric-strip" aria-label="Current resilience scores">
          <article class="metric-card metric-stability"><div class="metric-head"><span class="metric-label">System Stability</span><span class="metric-value" id="metric-stability-value">62</span></div><div class="metric-bar"><span class="metric-fill" id="metric-stability-fill"></span></div><p class="metric-copy" id="metric-stability-copy"></p></article>
          <article class="metric-card metric-trust"><div class="metric-head"><span class="metric-label">Public Trust</span><span class="metric-value" id="metric-trust-value">55</span></div><div class="metric-bar"><span class="metric-fill" id="metric-trust-fill"></span></div><p class="metric-copy" id="metric-trust-copy"></p></article>
          <article class="metric-card metric-fiscal"><div class="metric-head"><span class="metric-label">Fiscal Headroom</span><span class="metric-value" id="metric-fiscal-value">54</span></div><div class="metric-bar"><span class="metric-fill" id="metric-fiscal-fill"></span></div><p class="metric-copy" id="metric-fiscal-copy"></p></article>
          <article class="metric-card metric-clarity"><div class="metric-head"><span class="metric-label">Attribution Clarity</span><span class="metric-value" id="metric-clarity-value">38</span></div><div class="metric-bar"><span class="metric-fill" id="metric-clarity-fill"></span></div><p class="metric-copy" id="metric-clarity-copy"></p></article>
        </section>
        <section class="progress-panel"><div class="progress-head"><p class="mini-label">Exercise Progress</p><p class="progress-text" id="progressText"></p></div><div class="progress-track" aria-hidden="true"><span class="progress-fill" id="progressFill"></span></div></section>
        <section class="room-grid">
          <section class="stage-panel" aria-live="polite"><div class="stage-header"><span class="phase-chip" id="phaseChip"></span><span class="event-counter" id="eventCounter"></span></div><h2 class="stage-title" id="stageTitle"></h2><p class="stage-lead" id="stageLead"></p><div class="signal-row" id="signalRow"></div><div class="stage-body" id="stageBody"></div></section>
          <aside class="sidebar">
            <section class="panel"><div class="panel-head"><h3>Prepared Tools</h3><span class="panel-meta" id="toolCounter"></span></div><div class="tool-summary" id="toolSummary"></div></section>
            <section class="panel"><div class="panel-head"><h3>Decision Log</h3><span class="panel-meta">Newest first</span></div><div class="log-list" id="decisionLog"></div></section>
            <section class="panel"><div class="panel-head"><h3>Intel File</h3><span class="panel-meta">Live briefings</span></div><div class="source-list" id="sourceList"></div></section>
          </aside>
        </section>
      </main>
    </div>
    <script src="app.js?v=20260312j"></script>
  </body>
</html>
